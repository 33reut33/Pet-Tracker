<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Tracker — התחברות</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css?v=3">
    <link rel="stylesheet" href="css/login.css?v=3">
    <style>
        /* ── Fix centrage moniteur externe (position fixed = 100% fiable) ── */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
        body {
            background: linear-gradient(135deg, #1e755a 0%, #2a9d8f 100%) !important;
            overflow: hidden !important;
        }
        .login-page {
            position: fixed !important;
            top: 0 !important; right: 0 !important;
            bottom: 0 !important; left: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 20px !important;
            overflow-y: auto !important;
            height: auto !important;
            width: auto !important;
        }

        /* ── Layout 1280–1919px : bienvenu à côté du formulaire ── */
        @media (min-width: 1280px) and (max-width: 1919px) {
            .login-wrapper {
                grid-template-columns: 1fr 1fr !important;
                max-width: 940px !important;
            }
            .login-welcome {
                text-align: right !important;
                padding: 48px 40px !important;
                border-radius: 0 !important;
            }
            .welcome-stats {
                flex-direction: column !important;
                gap: 14px !important;
            }
            .login-card {
                border-radius: 0 !important;
                padding: 48px 40px !important;
            }
        }

        /* ── Layout ≥1920px (MAG Z22NHDW + Arzopa Z1C) : empilé ── */
        @media (min-width: 1920px) {
            .login-wrapper {
                grid-template-columns: 1fr !important;
                max-width: 720px !important;
            }
            .login-welcome {
                text-align: center !important;
                padding: 44px 60px 36px !important;
                border-radius: 0 !important;
            }
            .welcome-stats {
                flex-direction: row !important;
                justify-content: center !important;
                gap: 28px !important;
                flex-wrap: wrap !important;
            }
            .login-card {
                border-radius: 0 !important;
                padding: 44px 60px !important;
            }
        }
    </style>
</head>
<body class="auth-body">
    <main class="content-area login-page" style="margin:0;">

        <div class="login-wrapper">

            <!-- כרטיס שמאל — ברכה -->
            <div class="login-welcome">
                <div class="login-welcome-icon"><i class="fas fa-paw"></i></div>
                <h2>ברוכים השבים!</h2>
                <p>התחברו לחשבונכם כדי לעקוב אחר החיה שלכם בכל מקום ובכל זמן.</p>
                <div class="welcome-stats">
                    <div class="w-stat"><i class="fas fa-users"></i><span>+2,400 בעלי חיות</span></div>
                    <div class="w-stat"><i class="fas fa-map-marker-alt"></i><span>מעקב GPS מדויק</span></div>
                    <div class="w-stat"><i class="fas fa-shield-alt"></i><span>100% מאובטח</span></div>
                </div>
            </div>

            <!-- כרטיס ימין — טופס -->
            <div class="glass-card login-card">
                <h2 class="page-heading"><i class="fas fa-sign-in-alt"></i> התחברות לחשבון</h2>

                <div id="alert-error" class="alert error" style="display:none;"></div>

                <form id="login-form" onsubmit="handleLogin(event)" novalidate>

                    <div class="form-group" style="margin-bottom:16px;">
                        <label><i class="fas fa-envelope"></i> אימייל</label>
                        <input type="email" id="login-email" placeholder="mail@example.com" required autocomplete="email">
                    </div>

                    <div class="form-group" style="margin-bottom:8px;">
                        <label><i class="fas fa-lock"></i> סיסמה</label>
                        <div class="password-wrap">
                            <input type="password" id="login-password" placeholder="הזינו את הסיסמה" required autocomplete="current-password">
                            <i class="fas fa-eye toggle-pw" onclick="togglePw('login-password', this)"></i>
                        </div>
                    </div>

                    <div class="login-options">
                        <label class="checkbox-label remember-label">
                            <input type="checkbox" id="remember-me">
                            <span>זכור אותי</span>
                        </label>
                        <a href="#" class="forgot-link" onclick="showForgotPassword(); return false;">שכחתי סיסמה</a>
                    </div>

                    <button type="submit" id="login-btn" class="action-btn login-btn">
                        <i class="fas fa-sign-in-alt"></i> כניסה לחשבון
                    </button>

                </form>

                <p class="signup-hint">
                    עדיין אין לכם חשבון?
                    <a href="signup.html">הצטרפו בחינם</a>
                </p>
            </div>

        </div>

    </main>

    <script>
    (async function () {
        try {
            const res  = await fetch('api/auth_check.php');
            const data = await res.json();
            if (data.authenticated) window.location.replace('index.html');
        } catch { /* file:// local */ }
    })();
    </script>
    <script src="js/login.js"></script>
</body>
</html>
